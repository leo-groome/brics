version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
    container_name: brics_backend
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
    environment:
      # Debe apuntar a la URL de conexión de Neon (ej. postgres://user:pass@ep-lucky-shape-1234.us-east-2.aws.neon.tech/neondb)
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  redis:
    image: redis:7-alpine
    container_name: brics_redis
    ports:
      - "6379:6379"

